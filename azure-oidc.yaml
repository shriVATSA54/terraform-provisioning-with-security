trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  AWS_REGION: 'ap-south-1'
  AWS_ROLE_ARN: 'arn:aws:iam::306005333932:role/week-4-azure-devop'

steps:
- task: AzureCLI@2
  displayName: 'Get OIDC token and assume AWS role'
  inputs:
    azureSubscription: 'aws-oidc-federation'   # the dummy service connection
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      set -e

      # Get the OIDC token Azure DevOps issued for this service connection
      ID_TOKEN=$(curl -s -X POST \
        "https://vstoken.dev.azure.com/$(System.CollectionId)/oidctoken?api-version=7.1&serviceConnectionId=$(az devops service-endpoint list --query "[?name=='aws-oidc-federation'].id" -o tsv)" \
        -H "Authorization: Bearer $(System.AccessToken)" \
        -H "Content-Type: application/json" | jq -r '.oidcToken')

      # Exchange it for temporary AWS credentials
      CREDS=$(aws sts assume-role-with-web-identity \
        --role-arn "$(AWS_ROLE_ARN)" \
        --role-session-name "azdo-pipeline-$(Build.BuildId)" \
        --web-identity-token "$ID_TOKEN" \
        --duration-seconds 3600)

      echo "##vso[task.setvariable variable=AWS_ACCESS_KEY_ID;issecret=true]$(echo $CREDS | jq -r '.Credentials.AccessKeyId')"
      echo "##vso[task.setvariable variable=AWS_SECRET_ACCESS_KEY;issecret=true]$(echo $CREDS | jq -r '.Credentials.SecretAccessKey')"
      echo "##vso[task.setvariable variable=AWS_SESSION_TOKEN;issecret=true]$(echo $CREDS | jq -r '.Credentials.SessionToken')"

- script: |
    terraform init
    terraform plan -out=tfplan
    terraform apply -auto-approve tfplan
  displayName: 'Terraform plan & apply'
  env:
    AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
    AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
    AWS_SESSION_TOKEN: $(AWS_SESSION_TOKEN)
    AWS_REGION: $(AWS_REGION)